name: Smoke tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps and run smoke test
        working-directory: ./ollive
        run: |
          npm ci
          npm run db:push --silent -- --skip-generate || true
          npm run build
          node scripts/smoke-test.js
